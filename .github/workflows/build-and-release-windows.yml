name: Build and Release Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore certificate from secret (if provided)
        if: ${{ secrets.PFX_BASE64 != '' }}
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
        run: |
          if (-not $Env:PFX_BASE64) { Write-Error "PFX_BASE64 secret not set"; exit 1 }
          $bytes = [System.Convert]::FromBase64String($Env:PFX_BASE64)
          $pfxPath = Join-Path $PWD 'build' 'release-cert.pfx'
          New-Item -ItemType Directory -Force -Path (Split-Path $pfxPath) | Out-Null
          [System.IO.File]::WriteAllBytes($pfxPath, $bytes)
          Write-Output "Wrote PFX to $pfxPath"
          Add-Content -Path $Env:GITHUB_ENV -Value "CSC_LINK=$pfxPath"
          Add-Content -Path $Env:GITHUB_ENV -Value "CSC_KEY_PASSWORD=${{ secrets.PFX_PASSWORD }}"

      - name: Install dependencies and build (signed if CSC vars set)
        shell: pwsh
        run: |
          npm ci
          npm run build

      - name: Upload installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yans-windows-installers
          path: |
            dist/*.exe
            dist/*.msi
            dist/win-unpacked/YansApp.exe

      - name: Create GitHub Release and upload assets (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
