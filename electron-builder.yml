appId: "com.yansdev.yansapp"
productName: "YansApp"
copyright: "© 2025 YansDev"

directories:
  output: "dist"
  buildResources: "build"

files:
  - "src/**/*"
  - "package.json"

asar: true

win:
  target:
    - nsis
    - msi
  icon: "build/icon.ico"
  # For signing, set the environment variables `CSC_LINK` (local path or URL
  # to the PFX) and `CSC_KEY_PASSWORD` (the PFX password). Do NOT commit
  # private keys to the repository.
  # If the publisher name cannot be auto-extracted from the certificate,
  # specify it here as a fallback:

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  uninstallDisplayName: "YansApp"
  shortcutName: "YansApp"

msi:
  perMachine: false
  shortcutName: "YansApp"
