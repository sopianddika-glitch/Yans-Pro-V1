<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const buildKind = 'docs';
        const rawBuildMarker = '%VITE_BUILD' + '_KIND%';
        const isRawSourcePage = buildKind === rawBuildMarker;
        const isGitHubPages = window.location.hostname.endsWith('.github.io');
        const isDocsPath = /\/docs(?:\/|$)/.test(window.location.pathname);

        if (isGitHubPages && isRawSourcePage && !isDocsPath) {
          const fallbackUrl = new URL('./docs/', window.location.href);
          fallbackUrl.search = window.location.search;
          fallbackUrl.hash = window.location.hash;
          window.location.replace(fallbackUrl.toString());
          return;
        }

        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = './manifest.webmanifest';
        document.head.appendChild(manifestLink);
      })();
    </script>
    <link rel="icon" href="./assets/favicon-SPNtmkd8.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1117" />
    <meta
      name="description"
      content="Yans Pro is a professional finance tracker for transactions, invoices, budgets, products, and AI-assisted insights."
    />
    <title>Yans Pro</title>
    <script type="module" crossorigin src="./assets/index-qK0AtEHm.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BRLh5JGM.css">
  </head>
  <body class="bg-white dark:bg-brand-primary transition-colors duration-300">

    <noscript>Yans Pro requires JavaScript to render the application.</noscript>
  </body>
</html>
